<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/bootstrap-5.3.3-dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/all.min.css">
    <link rel="stylesheet" href="../css/fontawesome.min.css">
    <script src="../css/bootstrap-5.3.3-dist/js/bootstrap.min.js" rel="script"></script>
    <title></title>
</head>
<body>
    <nav class="px-4 mb-4 sign-nav">
        <div claas="container">
            <div class="section">
                <div class="row">
                    <div class="col-md-1 d-flex align-items-center">
                    </div>
                </div>
            </div>
        </div>
    </nav>
    <section>
        <form class="rounded" action="" target="" method="post">
            <div class="container">
                <div class="section create-acc-form-ds mb-4">
                    <div class="row p-4 m-4">
                        <h1 class="h3 mb-3 d-flex justify-content-center mb-5">Registration Form</h1>
                        <div class="col-md-1"></div>
                        <div class="col-md-10"><hr class="rounded bg-dark p-1"></div>
                        <div class="col-md-1"></div>
                        <label class="p-3 fw-bold">Account Name</label>
                        <div class="col-md-4">
                            <input type="text" name="firstname" class="form-control mb-2"
                                placeholder="First Name" required autofocus>
                        </div>
                        <div class="col-md-4">
                            <input type="text" name="middlename" class="form-control mb-2"
                                placeholder="Middle Name" required autofocus>
                        </div>
                        <div class="col-md-4">
                            <input type="text" name="lastname" class="form-control mb-2"
                                placeholder="Last Name" required autofocus>
                        </div>
                        <div class="col-md-9">
                            <label class="pt-3 mb-2 fw-bold">Birth Date</label>
                        </div>
                        <div class="col-md-3">
                            <label class="pt-3 mb-2 fw-bold">Gender</label>
                        </div>
                        <div class="col-md-3">
                            <select name="birth-month" class="form-control" id="Month">
                                <option value="Month">Month</option>
                                <option value="January">January</option>
                                <option value="February">February</option>
                                <option value="March">March</option>
                                <option value="April">April</option>
                                <option value="May">May</option>
                                <option value="June">June</option>
                                <option value="July">July</option>
                                <option value="August">August</option>
                                <option value="September">September</option>
                                <option value="October">October</option>
                                <option value="November">November</option>
                                <option value="December">December</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <select name="birth-day" class="form-control" id="Day">
                                <option value="Day">Day</option>
                                <option value="N-one">1</option><option value="N-two">2</option><option value="N-three">3</option>
                                <option value="N-four">4</option><option value="N-five">5</option><option value="N-Six">6</option>
                                <option value="N-seven">7</option><option value="N-eight">8</option><option value="N-nine">9</option>
                                <option value="N-ten">10</option><option value="N-eleven">11</option><option value="N-twelve">12</option> 
                                <option value="N-thirteen">13</option><option value="N-fourteen">14</option><option value="N-fifteen">15</option>
                                <option value="N-sixteen">16</option><option value="N-seventeen">17</option><option value="N-eighteen">18</option> 
                                <option value="N-nineteen">19</option><option value="N-twenty">20</option><option value="N-twetyone">21</option>
                                <option value="N-twentytwo">22</option><option value="N-twentythree">23</option><option value="N-twentyfour">24</option>
                                <option value="N-twentyfive">25</option><option value="N-twentysix">26</option><option value="N-twentysever">27</option>
                                <option value="N-twentyeight">28</option><option value="N-twentynine">29</option><option value="N-thirty">30</option>
                                <option value="N-thirtyone">31</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <select name="birth-year" class="form-control" id="Year">
                                <option value="Year">Year</option>
                                <option value="Y-2000">2000</option><option value="Y-2001">2001</option><option value="Y-2002">2002</option>
                                <option value="Y-2003">2003</option><option value="Y-2004">2004</option><option value="Y-2005">2005</option>
                                <option value="Y-2006">2006</option><option value="Y-2007">2007</option><option value="Y-2008">2008</option>
                                <option value="Y-2009">2009</option><option value="Y-2010">2010</option><option value="Y-2011">2011</option>
                                <option value="Y-2012">2012</option><option value="Y-2013">2013</option><option value="Y-2014">20014</option>
                                <option value="Y-2015">2015</option><option value="Y-2016">2016</option><option value="Y-2017">2017</option>
                                <option value="Y-2018">2018</option><option value="Y-2019">2019</option><option value="Y-2020">2020</option>
                                <option value="Y-2021">2021</option><option value="Y-2022">2022</option><option value="Y-2023">2023</option>
                                <option value="Y-2024">2024</option>
                            </select>
                        </div>
                        
                        <div class="col-md-3">
                            <select name="userGender" class="form-control" id="Gender">
                                <option value="Gender">...</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                            </select>
                        </div>

                        <div class="col-md-12">
                            <label class="pt-5 mb-2 fw-bold">Address</label>
                        </div>
                        <div class="col-md-12">
                            <input type="text" name="HomeAdd" class="form-control mb-2"
                            placeholder="Home Address" required autofocus>
                        </div>
                        <div class="col-md-5 mt-2">
                            <select class="address-inp-ds form-control" name="IslandGroup" id="Island">
                                <option value="Island">Island Group</option>       
                                <option value="Luzon">Luzon</option>
                                <option value="Visayas">Visayas</option>
                                <option value="Mindanao">Mindanao</option>
                            </select>
                        </div>
                        <div class="col-md-5 mt-2">
                            <select class="address-inp-ds form-control" name="City" id="City">
                                <option value="City">City</option>
                                <option value=""></option>
                                <option value=""></option>
                                <option value=""></option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <input type="text" name="ZIP" class="mt-3 form-control mb-2"
                            placeholder="ZIP Code" required autofocus>
                        </div>
                        <div class="col-md-5">
                            <select class="address-inp-ds form-control" name="Region" id="Region">
                                <option value="Region">Region</option>
                                <option value=""></option>
                                <option value=""></option>
                                <option value=""></option>
                            </select>
                        </div>
                        <div class="col-md-5">
                            <select class="address-inp-ds form-control" name="Barangay" id="Barangay">
                                <option value="Barangay">Barangay</option>
                                <option value=""></option>
                                <option value=""></option>
                                <option value=""></option>
                            </select>
                        </div>
                        <div class="col-md-2"></div>
                        <div class="col-md-12">
                            <label class="pt-5 mb-2 fw-bold">Account Information</label>
                        </div>
                        <div class="col-md-6">
                            <input type="text" name="EmailAdd" class="mt-3 form-control mb-2"
                            placeholder="Email Address" required autofocus>
                        </div>
                        <div class="col-md-6">
                            <input type="text" name="MobileNum" class="mt-3 form-control mb-2"
                            placeholder="Mobile Number" required autofocus>
                        </div>
                        <div class="col-md-6">
                            <input type="text" name="Password" class="mt-3 form-control mb-2"
                            placeholder="Password" required autofocus>
                        </div>
                        <div class="col-md-6">
                            <input type="text" name="Re-enterpass" class="mt-3 form-control mb-2"
                            placeholder="Re-enter Password" required autofocus>
                        </div>
                        <div class="col-md-6">
                            <input type="text" name="Occupation" class="mt-3 form-control mb-2"
                            placeholder="Occupation" required autofocus>
                        </div>
                        <div class="col-md-3">
                            <input type="text" name="CAPTCHA" class="mt-3 form-control mb-2"
                            placeholder="CAPTCHA" required autofocus>
                        </div>
                        <div class="col-md-2"></div>
                        <div class="col-md-6"></div>
                        <div class="col-md-3">
                            <input type="text" name="CAPTCHA-inp" class="mt-3 form-control mb-2"
                            placeholder="Enter CAPTCHA" required autofocus>
                        </div>
                        <div class="col-md-2">
                            <input type="text" name="" class="mt-3 form-control mb-2 bg-secondary"
                            placeholder="" required autofocus>
                        </div>
                        <div class="col-md-12"><hr class="rounded bg-dark p-1"></div>
                        <div class="col-md-12 d-flex justify-content-center pt-3 mt-4">
                            <p><input type="checkbox" id="terms-conditions" name="terms-conditions" value="Agreement" class="me-2"> READ THE TERMS AND CONDITIONS, A LINK THAT WILL SHOW YOU THE TERMS AND CONDITIONS</p>
                        </div>
                        <div class="col-md-12 d-flex justify-content-center align-items-center">
                            <button class="btn btn-md bg-secondary rounded" type="submit"
                                name="submit">Create
                                Account</button>
                        </div>
                    </div>
                </div>
            </div>
        </form> 
    </section>
</body>

</html>
