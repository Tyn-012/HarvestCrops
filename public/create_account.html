    <section>
        <div class="container text-bolder">
            <div class="section">
                <div class="row">
                    <div class="col-md-3"></div>
                    <div class="col-md-6">
                        <form class="form-border rounded" action="create_account.php" target="sign_in.php"
                            method="post">
                            <h1 class="h3 mb-3 font-weight-normal d-flex justify-content-center mb-5">Create your
                                account</h1>
                            <div class="row">
                                <div class="col-md-6">
                                    <label for="firstname" class="inp-default">First Name</label>
                                    <input type="text" name="firstname" class="form-control mb-2"
                                        placeholder="Input your first name" required autofocus>
                                </div>
                                <div class="col-md-6">
                                    <label for="lastname" class="inp-default">Last Name</label>
                                    <input type="text" name="lastname" class="form-control mb-2"
                                        placeholder="Input your last name" required autofocus>
                                </div>
                                <div class="col-md-12">
                                    <label for="createEmail" class="inp-default">Email Address</label>
                                    <input type="email" name="createEmail" class="form-control mb-2"
                                        placeholder="Email address" required autofocus>
                                    <label for="Phone-number">Phone Number</label>
                                    <input type="text" name="Phone-number" class="form-control mb-2"
                                        placeholder="Phone Number" required>
                                    <label for="createPassword">Create Password</label>
                                    <input type="password" name="createPassword" class="form-control mb-2"
                                        placeholder="Password" required>
                                    <label for="confirmPassword">Confirm Password</label>
                                    <input type="password" name="confirmPassword" class="form-control mb-2"
                                        placeholder="Confirm Password" required>
                                </div>
                                <div class="col-md-4 mb-4 rd-btn-txtbox">
                                    <input type="radio" value="Male" id="Male" name="gender" required><label
                                        for="gender">&nbsp;Male</label>
                                    <input type="radio" value="Female" id="Female" name="gender" required><label
                                        for="gender">&nbsp;Female</label>
                                </div>
                                <div class="col-md-12 d-flex justify-content-end align-items-center">
                                    <button class="btn btn-md rounded" type="submit"
                                        name="submit">Create
                                        Account</button>
                                </div>
                            </div>
                    </div>
